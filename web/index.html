<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Orchestrator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #1e1f20;
      --bg-sidebar:   #131314;
      --bg-input:     #2a2b2e;
      --bg-hover:     #2d2e30;
      --bg-user-msg:  #2c2d30;
      --bg-chip:      #2a2b2e;
      --border:       #3c3d3e;
      --text-primary: #e3e3e3;
      --text-secondary:#9aa0a6;
      --text-muted:   #5f6368;
      --accent-blue:  #89b4fa;
      --accent-purple:#cba6f7;
      --accent-teal:  #94e2d5;
      --accent-pink:  #f38ba8;
      --accent-yellow:#f9e2af;
      --accent-green: #a6e3a1;
      --gemini-grad:  linear-gradient(135deg, #4285f4 0%, #9c27b0 50%, #e91e63 100%);
      --sidebar-w:    260px;
      --radius-sm:    8px;
      --radius-md:    16px;
      --radius-lg:    24px;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans KR', 'Google Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Scrollbar ────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3c3d3e; border-radius: 3px; }

    /* ── Sidebar ──────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      padding: 12px 8px;
      border-right: 1px solid var(--border);
      overflow: hidden;
      transition: width .2s ease;
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px 16px;
      cursor: pointer;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--gemini-grad);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 600;
      background: var(--gemini-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      cursor: pointer;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      transition: background .15s;
      user-select: none;
      border: 1px solid var(--border);
      background: transparent;
      width: 100%;
      margin-bottom: 8px;
    }
    .new-chat-btn:hover { background: var(--bg-hover); }
    .new-chat-btn svg { flex-shrink: 0; }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 10px 14px 4px;
      letter-spacing: .8px;
      text-transform: uppercase;
    }
    .chat-history {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .chat-history-item {
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background .15s, color .15s;
    }
    .chat-history-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .chat-history-item.active { background: var(--bg-hover); color: var(--text-primary); }

    .sidebar-bottom {
      padding: 8px 0;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .sidebar-bottom-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      transition: background .15s, color .15s;
    }
    .sidebar-bottom-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--gemini-grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* ── Main ─────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── Top bar ──────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      flex-shrink: 0;
    }
    .model-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-md);
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    .model-selector:hover { background: var(--bg-hover); }
    .model-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gemini-grad);
    }
    .topbar-actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: background .15s, color .15s;
      background: transparent;
      border: none;
    }
    .icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* ── Chat area ────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 0 0 20px;
      display: flex;
      flex-direction: column;
    }
    .chat-inner {
      max-width: 740px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Welcome screen ───────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 60px 20px 20px;
      text-align: center;
    }
    .welcome-logo {
      width: 64px; height: 64px;
      background: var(--gemini-grad);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      margin-bottom: 20px;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(66,133,244,.3); }
      50% { box-shadow: 0 0 0 14px rgba(66,133,244,0); }
    }
    .welcome h1 {
      font-size: 28px;
      font-weight: 400;
      background: var(--gemini-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .welcome p {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 36px;
      max-width: 480px;
    }
    .suggestion-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 600px;
    }
    .suggestion-card {
      background: var(--bg-chip);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      transition: background .15s, border-color .15s;
    }
    .suggestion-card:hover { background: var(--bg-hover); border-color: #5f6368; }
    .suggestion-card .card-icon { font-size: 20px; margin-bottom: 8px; }
    .suggestion-card .card-title { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 3px; }
    .suggestion-card .card-desc { font-size: 12px; color: var(--text-secondary); }

    /* ── Messages ─────────────────────────────────────── */
    .message-group { padding: 8px 0; }
    .message {
      display: flex;
      gap: 12px;
      padding: 10px 0;
    }
    .message.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }
    .msg-avatar.ai {
      background: var(--gemini-grad);
    }
    .msg-avatar.user {
      background: #3c4043;
      color: var(--text-primary);
    }
    .msg-content { flex: 1; min-width: 0; }
    .msg-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .msg-bubble {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-primary);
    }
    .message.user .msg-bubble {
      background: var(--bg-user-msg);
      border-radius: var(--radius-md) 4px var(--radius-md) var(--radius-md);
      padding: 10px 16px;
      display: inline-block;
      max-width: 85%;
    }
    .message.user .msg-content { display: flex; flex-direction: column; align-items: flex-end; }

    /* AI 응답 마크다운 스타일 */
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
      margin: 12px 0 6px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .msg-bubble h1 { font-size: 18px; }
    .msg-bubble h2 { font-size: 16px; }
    .msg-bubble h3 { font-size: 14px; }
    .msg-bubble p { margin-bottom: 8px; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin-bottom: 8px; }
    .msg-bubble li { margin-bottom: 4px; }
    .msg-bubble code {
      background: #2d2e30;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: var(--accent-teal);
    }
    .msg-bubble pre {
      background: #1a1b1e;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .msg-bubble pre code {
      background: transparent;
      border: none;
      padding: 0;
      color: var(--text-primary);
    }
    .msg-bubble strong { color: var(--text-primary); font-weight: 600; }
    .msg-bubble a { color: var(--accent-blue); text-decoration: none; }
    .msg-bubble a:hover { text-decoration: underline; }
    .msg-bubble blockquote {
      border-left: 3px solid var(--accent-blue);
      padding-left: 14px;
      color: var(--text-secondary);
      margin: 8px 0;
    }

    /* 타이핑 인디케이터 */
    .typing-indicator {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 0;
    }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing-bounce .8s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* meta chips (model, ms) */
    .msg-meta {
      display: flex; align-items: center; gap: 8px;
      margin-top: 8px; flex-wrap: wrap;
    }
    .msg-chip {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-chip);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
    }
    .msg-chip.provider-openai { color: #10a37f; border-color: #10a37f40; }
    .msg-chip.provider-anthropic { color: #d4956a; border-color: #d4956a40; }
    .msg-chip.provider-google { color: var(--accent-blue); border-color: #4285f440; }
    .msg-actions {
      display: flex; gap: 4px; margin-top: 6px; opacity: 0;
      transition: opacity .15s;
    }
    .message:hover .msg-actions { opacity: 1; }
    .action-btn {
      background: transparent; border: none;
      color: var(--text-muted); cursor: pointer;
      padding: 4px 6px; border-radius: 6px;
      font-size: 12px;
      transition: background .15s, color .15s;
      display: flex; align-items: center; gap: 4px;
    }
    .action-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* ── Input area ───────────────────────────────────── */
    .input-wrapper {
      flex-shrink: 0;
      padding: 12px 20px 20px;
    }
    .input-container {
      max-width: 740px;
      margin: 0 auto;
    }
    .input-box {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s;
    }
    .input-box:focus-within { border-color: #5f6368; }
    .input-row { display: flex; align-items: flex-end; gap: 10px; }
    #messageInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      min-height: 24px;
      max-height: 180px;
      line-height: 1.6;
    }
    #messageInput::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--gemini-grad);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      flex-shrink: 0;
      transition: opacity .15s, transform .1s;
    }
    .send-btn:disabled { opacity: .3; cursor: default; }
    .send-btn:not(:disabled):hover { transform: scale(1.05); }
    .send-btn:not(:disabled):active { transform: scale(.96); }

    .input-bottom {
      display: flex; align-items: center; justify-content: space-between;
    }
    .input-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .input-chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background .15s, color .15s;
      user-select: none;
    }
    .input-chip:hover { background: #3c3d3e; color: var(--text-primary); }
    .input-chip.active { border-color: var(--accent-blue); color: var(--accent-blue); }
    .char-count { font-size: 11px; color: var(--text-muted); }

    .disclaimer {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
    }

    /* ── Toast ────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #3c3d3e;
      color: var(--text-primary);
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Status badge ─────────────────────────────────── */
    .status-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-muted);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #34a853;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .suggestion-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">✦</div>
    <span class="logo-text">AI Orchestra</span>
  </div>

  <button class="new-chat-btn" id="newChatBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    새 대화
  </button>

  <div class="sidebar-section-title">최근 대화</div>
  <div class="chat-history" id="chatHistory"></div>

  <div class="sidebar-bottom">
    <div class="sidebar-bottom-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
      </svg>
      설정
    </div>
    <div class="sidebar-bottom-item">
      <div class="avatar">A</div>
      admin@ai-orch.local
    </div>
  </div>
</aside>

<!-- ── Main ── -->
<main class="main">
  <!-- Top bar -->
  <div class="topbar">
    <div class="model-selector" id="modelSelector">
      <div class="model-dot"></div>
      <span id="currentModel">AI Orchestrator</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
    <div class="topbar-actions">
      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">연결 중...</span>
      </div>
      <button class="icon-btn" title="새 대화" id="topNewChat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">
    <div class="chat-inner" id="chatInner">
      <!-- Welcome screen -->
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-logo">✦</div>
        <h1>무엇을 도와드릴까요?</h1>
        <p>멀티 AI 오케스트레이션 엔진이 의도를 분석하고<br>최적의 모델 조합으로 응답합니다</p>
        <div class="suggestion-grid">
          <div class="suggestion-card" data-prompt="파이썬으로 CSV 파일을 읽어서 데이터를 분석하는 코드를 작성해줘">
            <div class="card-icon">💻</div>
            <div class="card-title">코드 작성</div>
            <div class="card-desc">파이썬 CSV 데이터 분석 코드</div>
          </div>
          <div class="suggestion-card" data-prompt="AI 스타트업을 위한 투자자 대상 사업계획서 보고서를 작성해줘">
            <div class="card-icon">📈</div>
            <div class="card-title">분석 리포트</div>
            <div class="card-desc">AI 스타트업 사업계획서 작성</div>
          </div>
          <div class="suggestion-card" data-prompt="스마트 헬스케어 앱의 온보딩 화면을 위한 프레젠테이션 슬라이드를 만들어줘">
            <div class="card-icon">📊</div>
            <div class="card-title">프레젠테이션</div>
            <div class="card-desc">헬스케어 앱 온보딩 슬라이드</div>
          </div>
          <div class="suggestion-card" data-prompt="제품 출시 알림 이메일을 작성해줘. 신규 SaaS 툴이고 얼리버드 할인 30%가 있어">
            <div class="card-icon">✉️</div>
            <div class="card-title">이메일 작성</div>
            <div class="card-desc">SaaS 제품 출시 알림 이메일</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="input-wrapper">
    <div class="input-container">
      <div class="input-box">
        <div class="input-row">
          <textarea
            id="messageInput"
            placeholder="메시지를 입력하세요..."
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
        <div class="input-bottom">
          <div class="input-chips">
            <div class="input-chip" id="chipVision">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              Vision
            </div>
            <div class="input-chip" id="chipCode">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
              </svg>
              코드
            </div>
            <div class="input-chip" id="chipAnalysis">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
              </svg>
              분석
            </div>
          </div>
          <span class="char-count" id="charCount"></span>
        </div>
      </div>
      <div class="disclaimer">AI Orchestra는 실수를 할 수 있습니다. 중요한 정보는 직접 확인하세요.</div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ── 설정 ───────────────────────────────────────────────
const API_BASE = '';  // 같은 서버 — 상대경로

// ── 상태 ───────────────────────────────────────────────
let token = null;
let sessionId = null;
let isLoading = false;

// ── 초기화 ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);

async function init() {
  await createSession();
  setupEventListeners();
  autoResizeTextarea();
}

// ── 세션 생성 (인증 불필요) ────────────────────────────
async function createSession() {
  try {
    setStatus(false, '연결 중...');
    const res = await fetch(`${API_BASE}/api/session`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    sessionId = data.sessionId || data.id;
    setStatus(true, '연결됨');
    console.log('세션 생성 성공:', sessionId);
  } catch(e) {
    setStatus(false, '오프라인');
    showToast(`서버 연결 실패: ${e.message}. 5초 후 재시도...`);
    setTimeout(createSession, 5000);
  }
}

function authHeaders() {
  return {
    'Content-Type': 'application/json',
    ...(token ? { 'Authorization': `Bearer ${token}` } : {})
  };
}

// ── 상태 표시 ──────────────────────────────────────────
function setStatus(online, msg) {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.style.background  = online ? '#34a853' : '#ea4335';
  text.textContent = msg || (online ? '연결됨' : '오프라인');
}

// ── 이벤트 ─────────────────────────────────────────────
function setupEventListeners() {
  const input   = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');

  input.addEventListener('input', () => {
    sendBtn.disabled = !input.value.trim() || isLoading;
    updateCharCount(input.value.length);
    autoResizeTextarea();
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  document.getElementById('newChatBtn').addEventListener('click', newChat);
  document.getElementById('topNewChat').addEventListener('click', newChat);

  // 제안 카드
  document.querySelectorAll('.suggestion-card').forEach(card => {
    card.addEventListener('click', () => {
      const prompt = card.dataset.prompt;
      document.getElementById('messageInput').value = prompt;
      document.getElementById('sendBtn').disabled = false;
      updateCharCount(prompt.length);
      autoResizeTextarea();
      sendMessage();
    });
  });

  // 칩
  ['chipVision','chipCode','chipAnalysis'].forEach(id => {
    document.getElementById(id).addEventListener('click', function() {
      this.classList.toggle('active');
    });
  });
}

// ── 메시지 전송 ────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text  = input.value.trim();
  if (!text || isLoading) return;

  hideWelcome();
  addUserMessage(text);
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  updateCharCount(0);
  autoResizeTextarea();

  if (!sessionId) await createSession();

  isLoading = true;
  const typingId = addTypingIndicator();

  try {
    const res = await fetch(`${API_BASE}/api/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, message: text })
    });

    if (!res.ok) {
      if (res.status === 401) { await createSession(); }
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();
    removeTypingIndicator(typingId);
    addAIMessage(data);
    saveChatHistory(text, data.reply || data.response || '');
  } catch(e) {
    removeTypingIndicator(typingId);
    addErrorMessage('응답을 가져오지 못했습니다: ' + e.message);
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = !input.value.trim();
  }
}

// ── DOM: 메시지 추가 ───────────────────────────────────
function hideWelcome() {
  const w = document.getElementById('welcomeScreen');
  if (w) w.style.display = 'none';
}

function addUserMessage(text) {
  const el = document.createElement('div');
  el.className = 'message user';
  el.innerHTML = `
    <div class="msg-avatar user">나</div>
    <div class="msg-content">
      <div class="msg-bubble">${escapeHtml(text)}</div>
    </div>`;
  appendToChat(el);
}

function addAIMessage(data) {
  const reply    = data.reply || data.response || data.content || '응답을 가져오지 못했습니다.';
  const model    = data.model    || '';
  const provider = data.provider || '';
  const ms       = data.ms || data.duration || '';

  const el = document.createElement('div');
  el.className = 'message ai';

  const providerClass = provider ? `provider-${provider.toLowerCase()}` : '';
  el.innerHTML = `
    <div class="msg-avatar ai">✦</div>
    <div class="msg-content">
      <div class="msg-name">AI Orchestra</div>
      <div class="msg-bubble">${renderMarkdown(reply)}</div>
      <div class="msg-meta">
        ${model    ? `<span class="msg-chip ${providerClass}">${model}</span>` : ''}
        ${provider ? `<span class="msg-chip ${providerClass}">${provider}</span>` : ''}
        ${ms       ? `<span class="msg-chip">${ms}ms</span>` : ''}
      </div>
      <div class="msg-actions">
        <button class="action-btn" onclick="copyText(this)" data-text="${escapeHtml(reply)}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          복사
        </button>
      </div>
    </div>`;
  appendToChat(el);
}

function addErrorMessage(msg) {
  const el = document.createElement('div');
  el.className = 'message ai';
  el.innerHTML = `
    <div class="msg-avatar ai" style="background:#ea4335">!</div>
    <div class="msg-content">
      <div class="msg-bubble" style="color:#f38ba8">${escapeHtml(msg)}</div>
    </div>`;
  appendToChat(el);
}

function addTypingIndicator() {
  const id = 'typing-' + Date.now();
  const el = document.createElement('div');
  el.id = id;
  el.className = 'message ai';
  el.innerHTML = `
    <div class="msg-avatar ai">✦</div>
    <div class="msg-content">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  appendToChat(el);
  return id;
}

function removeTypingIndicator(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function appendToChat(el) {
  const inner = document.getElementById('chatInner');
  inner.appendChild(el);
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

// ── 새 대화 ────────────────────────────────────────────
async function newChat() {
  document.getElementById('chatInner').innerHTML = `
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-logo">✦</div>
      <h1>무엇을 도와드릴까요?</h1>
      <p>멀티 AI 오케스트레이션 엔진이 의도를 분석하고<br>최적의 모델 조합으로 응답합니다</p>
      <div class="suggestion-grid">
        <div class="suggestion-card" data-prompt="파이썬으로 CSV 파일을 읽어서 데이터를 분석하는 코드를 작성해줘">
          <div class="card-icon">💻</div>
          <div class="card-title">코드 작성</div>
          <div class="card-desc">파이썬 CSV 데이터 분석 코드</div>
        </div>
        <div class="suggestion-card" data-prompt="AI 스타트업을 위한 투자자 대상 사업계획서 보고서를 작성해줘">
          <div class="card-icon">📈</div>
          <div class="card-title">분석 리포트</div>
          <div class="card-desc">AI 스타트업 사업계획서 작성</div>
        </div>
        <div class="suggestion-card" data-prompt="스마트 헬스케어 앱의 온보딩 화면을 위한 프레젠테이션 슬라이드를 만들어줘">
          <div class="card-icon">📊</div>
          <div class="card-title">프레젠테이션</div>
          <div class="card-desc">헬스케어 앱 온보딩 슬라이드</div>
        </div>
        <div class="suggestion-card" data-prompt="제품 출시 알림 이메일을 작성해줘. 신규 SaaS 툴이고 얼리버드 할인 30%가 있어">
          <div class="card-icon">✉️</div>
          <div class="card-title">이메일 작성</div>
          <div class="card-desc">SaaS 제품 출시 알림 이메일</div>
        </div>
      </div>
    </div>`;

  // 제안 카드 재등록
  document.querySelectorAll('.suggestion-card').forEach(card => {
    card.addEventListener('click', () => {
      const prompt = card.dataset.prompt;
      document.getElementById('messageInput').value = prompt;
      document.getElementById('sendBtn').disabled = false;
      sendMessage();
    });
  });

  sessionId = null;
  await createSession();
  document.getElementById('messageInput').value = '';
  document.getElementById('sendBtn').disabled = true;
}

// ── 히스토리 ───────────────────────────────────────────
function saveChatHistory(userMsg, aiReply) {
  const history = document.getElementById('chatHistory');
  const item = document.createElement('div');
  item.className = 'chat-history-item active';
  // 기존 active 제거
  history.querySelectorAll('.chat-history-item').forEach(i => i.classList.remove('active'));
  item.textContent = userMsg.length > 30 ? userMsg.slice(0, 30) + '…' : userMsg;
  history.prepend(item);
}

// ── 유틸 ───────────────────────────────────────────────
function autoResizeTextarea() {
  const ta = document.getElementById('messageInput');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 180) + 'px';
}

function updateCharCount(n) {
  const el = document.getElementById('charCount');
  el.textContent = n > 50 ? `${n}자` : '';
}

function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function copyText(btn) {
  const text = btn.dataset.text;
  navigator.clipboard.writeText(text).then(() => showToast('복사됨'));
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 마크다운 렌더러 (간이) ─────────────────────────────
function renderMarkdown(text) {
  if (!text) return '';
  let html = escapeHtml(text);

  // 코드 블록
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`);
  // 인라인 코드
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // 헤딩
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  // 굵게/이탤릭
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*]+)\*/g,     '<em>$1</em>');
  // 링크
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // 목록
  html = html.replace(/^- (.+)$/gm,  '<li>$1</li>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/gs, m =>
    m.includes('\n') ? `<ul>${m}</ul>` : `<ul>${m}</ul>`);
  // 인용
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // 줄바꿈
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  if (!html.startsWith('<')) html = `<p>${html}</p>`;

  return html;
}
</script>

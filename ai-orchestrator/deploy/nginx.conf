# AI Orchestrator — Nginx 설정 (VPS 프로덕션)
# 위치: /etc/nginx/sites-available/ai-orchestrator
# 심링크: ln -s /etc/nginx/sites-available/ai-orchestrator /etc/nginx/sites-enabled/

upstream ai_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;   # ← 도메인으로 교체 (없으면 _)

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTPS 미사용시 아래 3줄 주석처리, 다음 블록 그대로 사용
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인 서버
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN_HERE;   # ← 도메인으로 교체

    # SSL 인증서 (certbot 설치 후 자동으로 채워짐)
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50M;

    # ─── SSE 스트리밍 (버퍼링 반드시 off!) ──────────────────
    location /api/ai/chat/stream {
        proxy_pass http://ai_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 스트리밍 핵심 설정
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        chunked_transfer_encoding on;

        add_header Cache-Control "no-cache";
        add_header X-Accel-Buffering "no";
    }

    # ─── WebSocket (Socket.IO) ───────────────────────────────
    location /socket.io/ {
        proxy_pass http://ai_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ─── API 엔드포인트 ─────────────────────────────────────
    location /api/ {
        proxy_pass http://ai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    # ─── 정적 파일 캐시 ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        proxy_pass http://ai_backend;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
    }

    # ─── 헬스체크 ───────────────────────────────────────────
    location /health {
        proxy_pass http://ai_backend;
        access_log off;
    }

    # ─── 메인 앱 ────────────────────────────────────────────
    location / {
        proxy_pass http://ai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 로그 ───────────────────────────────────────────────
    access_log /var/log/nginx/ai-orchestrator-access.log;
    error_log  /var/log/nginx/ai-orchestrator-error.log warn;
}

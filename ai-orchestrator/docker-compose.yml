version: '3.9'

services:
  # ─────────────────────────────────────────────────────────
  # AI 오케스트레이터 메인 서버
  # ─────────────────────────────────────────────────────────
  ai-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-orchestrator
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000

      # JWT 설정 (프로덕션에서는 강력한 시크릿으로 교체)
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_IN_PRODUCTION_USE_STRONG_SECRET_64CHARS}
      JWT_EXPIRES: ${JWT_EXPIRES:-24h}

      # 어드민 계정
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ai-orch.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}

      # AI 공급자 API 키
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

      # 실제 OpenAI 키 (프록시 우회용)
      REAL_OPENAI_API_KEY: ${OPENAI_API_KEY}

      # 기본 모델 설정
      DEFAULT_TEXT_MODEL: ${DEFAULT_TEXT_MODEL:-gpt-4o}
      DEFAULT_ANALYSIS_MODEL: ${DEFAULT_ANALYSIS_MODEL:-gpt-4o}
      DEFAULT_CHAT_MODEL: ${DEFAULT_CHAT_MODEL:-gpt-4o-mini}
      DEFAULT_CODE_MODEL: ${DEFAULT_CODE_MODEL:-gpt-4o}
      DEFAULT_CREATIVE_MODEL: ${DEFAULT_CREATIVE_MODEL:-gpt-4o}
      DEFAULT_FAST_MODEL: ${DEFAULT_FAST_MODEL:-gpt-4o-mini}

      # Redis (선택사항 - 없으면 인메모리 큐 사용)
      REDIS_URL: ${REDIS_URL:-}

    volumes:
      # SQLite DB 및 로그 영속화
      - ai_data:/app/data
      - ai_logs:/app/logs

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - ai-network

    depends_on:
      - redis

  # ─────────────────────────────────────────────────────────
  # Redis (작업 큐 / 세션 캐시)
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────
  # Nginx 리버스 프록시 (HTTPS + 정적 파일)
  # ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ai_logs:/var/log/nginx
    networks:
      - ai-network
    depends_on:
      - ai-orchestrator
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3

# ─────────────────────────────────────────────────────────
# 볼륨
# ─────────────────────────────────────────────────────────
volumes:
  ai_data:
    driver: local
  ai_logs:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────────────────────
# 네트워크
# ─────────────────────────────────────────────────────────
networks:
  ai-network:
    driver: bridge

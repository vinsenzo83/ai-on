<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Orchestrator — Provider Health Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3e;
    --ok: #22c55e; --warn: #f59e0b; --error: #ef4444; --info: #3b82f6;
    --text: #e2e8f0; --muted: #64748b; --accent: #6366f1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  header .status-bar { display: flex; gap: 12px; align-items: center; font-size: .85rem; }
  .badge { padding: 3px 10px; border-radius: 99px; font-size: .78rem; font-weight: 600; }
  .badge-ok { background: #166534; color: var(--ok); }
  .badge-warn { background: #78350f; color: var(--warn); }
  .badge-error { background: #7f1d1d; color: var(--error); }
  .badge-info { background: #1e3a5f; color: var(--info); }
  main { max-width: 1280px; margin: 0 auto; padding: 24px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media(max-width:900px) { .grid-4,.grid-3,.grid-2 { grid-template-columns: 1fr 1fr; } }
  @media(max-width:600px) { .grid-4,.grid-3,.grid-2 { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card h2 { font-size: .85rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .card .val { font-size: 2rem; font-weight: 700; }
  .card .sub { font-size: .8rem; color: var(--muted); margin-top: 4px; }
  .section-title { font-size: 1rem; font-weight: 600; margin: 24px 0 12px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th { text-align: left; color: var(--muted); padding: 8px 12px; font-weight: 500; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .dot-ok { background: var(--ok); }
  .dot-warn { background: var(--warn); }
  .dot-error { background: var(--error); }
  .dot-null { background: var(--muted); }
  .btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: .85rem; font-weight: 600; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger  { background: var(--error); color: #fff; }
  .btn-sm { padding: 5px 12px; font-size: .78rem; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .log-box { background: #0a0c12; border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: monospace; font-size: .78rem; max-height: 280px; overflow-y: auto; line-height: 1.6; }
  .log-box .ok   { color: var(--ok); }
  .log-box .warn { color: var(--warn); }
  .log-box .err  { color: var(--error); }
  .log-box .info { color: var(--info); }
  .log-box .muted { color: var(--muted); }
  .bar-wrap { background: #1e2030; border-radius: 99px; height: 6px; width: 100%; }
  .bar-fill { height: 6px; border-radius: 99px; transition: width .4s; }
  .bar-ok   { background: var(--ok); }
  .bar-warn { background: var(--warn); }
  .bar-err  { background: var(--error); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #live-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); animation: pulse 1.5s ease infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
  .provider-card { border-left: 3px solid var(--border); }
  .provider-card.status-ok   { border-left-color: var(--ok); }
  .provider-card.status-down { border-left-color: var(--error); }
  .provider-card.status-degraded { border-left-color: var(--warn); }
  .provider-card.status-unknown { border-left-color: var(--muted); }
  .cost-chip { font-size: .75rem; color: var(--ok); background: #14532d; padding: 2px 8px; border-radius: 4px; }
  .err-chip  { font-size: .75rem; color: var(--error); background: #450a0a; padding: 2px 8px; border-radius: 4px; }
  .cache-chip { font-size: .75rem; color: var(--info); background: #1e3a5f; padding: 2px 8px; border-radius: 4px; }
  .refresh-btn { margin-left: auto; }
  select, input { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: .82rem; }
</style>
</head>
<body>
<header>
  <h1>🤖 AI Orchestrator — Health Dashboard</h1>
  <div class="status-bar">
    <div id="live-indicator"></div>
    <span id="last-refresh" style="color:var(--muted)">갱신 중...</span>
    <button class="btn btn-primary btn-sm" onclick="refreshAll()">↻ 새로고침</button>
    <button class="btn btn-sm" style="background:var(--card);border:1px solid var(--border)" onclick="runHealthCheck()">⚡ 헬스체크</button>
  </div>
</header>
<main>

<!-- 요약 카드 -->
<div class="grid-4" id="summary-cards">
  <div class="card"><h2>총 요청 (24h)</h2><div class="val" id="s-total">—</div><div class="sub" id="s-success">—</div></div>
  <div class="card"><h2>실제 성공률</h2><div class="val" id="s-real">—</div><div class="sub" id="s-fallback">—</div></div>
  <div class="card"><h2>누적 비용 (24h)</h2><div class="val" id="s-cost">—</div><div class="sub" id="s-tokens">토큰 —</div></div>
  <div class="card"><h2>활성 공급자</h2><div class="val" id="s-providers">—</div><div class="sub" id="s-models">—</div></div>
</div>

<!-- 응답 캐시 -->
<div class="section-title">💾 응답 캐시</div>
<div class="card" style="margin-bottom:24px">
  <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">
    <div><span class="muted" style="font-size:.85rem;color:var(--muted)">캐시 크기: </span><span id="cache-size" class="cache-chip">—</span></div>
    <div><span class="muted" style="font-size:.85rem;color:var(--muted)">유효 항목: </span><span id="cache-valid" class="cache-chip">—</span></div>
    <div><span class="muted" style="font-size:.85rem;color:var(--muted)">최대 크기: </span><span id="cache-max" class="cache-chip">—</span></div>
    <div><span class="muted" style="font-size:.85rem;color:var(--muted)">TTL: </span><span id="cache-ttl" class="cache-chip">—</span></div>
    <button class="btn btn-danger btn-sm refresh-btn" onclick="clearCache()">🗑 캐시 초기화</button>
  </div>
</div>

<!-- 공급자 카드 -->
<div class="section-title">🔌 공급자별 상태</div>
<div id="provider-grid" class="grid-3"></div>

<!-- 에러 분석 -->
<div class="section-title">
  ⚠️ 에러 분석
  <select id="err-days" onchange="loadErrors()" style="margin-left:auto">
    <option value="1">최근 1일</option>
    <option value="7" selected>최근 7일</option>
    <option value="30">최근 30일</option>
  </select>
</div>
<div class="card" style="margin-bottom:24px">
  <table>
    <thead><tr><th>에러 코드</th><th>카테고리</th><th>공급자</th><th>건수</th><th>마지막 발생</th><th>비율</th></tr></thead>
    <tbody id="err-tbody"><tr><td colspan="6" style="color:var(--muted);text-align:center">로딩 중...</td></tr></tbody>
  </table>
</div>

<!-- 추론 통계 -->
<div class="section-title">
  📊 추론 통계
  <select id="stat-days" onchange="loadStats()" style="margin-left:auto">
    <option value="1">최근 1일</option>
    <option value="7" selected>최근 7일</option>
  </select>
</div>
<div class="card" style="margin-bottom:24px">
  <table>
    <thead><tr><th>공급자</th><th>총 호출</th><th>실제 성공</th><th>Fallback</th><th>에러</th><th>평균 응답(ms)</th><th>누적 비용</th></tr></thead>
    <tbody id="stat-tbody"><tr><td colspan="7" style="color:var(--muted);text-align:center">로딩 중...</td></tr></tbody>
  </table>
</div>

<!-- 최근 로그 -->
<div class="section-title">
  📋 최근 추론 로그
  <select id="log-limit" onchange="loadRecentLogs()" style="margin-left:auto">
    <option value="20" selected>20건</option>
    <option value="50">50건</option>
    <option value="100">100건</option>
  </select>
</div>
<div class="log-box" id="recent-logs">로딩 중...</div>

<!-- 스트리밍 테스트 -->
<div class="section-title">⚡ 스트리밍 테스트</div>
<div class="card">
  <div class="toolbar">
    <input id="stream-prompt" style="flex:1;min-width:200px" placeholder="테스트 메시지 입력..." value="안녕하세요! 한 문장으로 자기소개해주세요.">
    <select id="stream-model">
      <option value="">자동 선택</option>
      <option value="gpt-4o-mini">GPT-4o-mini</option>
      <option value="claude-haiku-4-5-20251001">Claude Haiku</option>
      <option value="deepseek-chat">DeepSeek Chat</option>
      <option value="mistral-small-latest">Mistral Small</option>
    </select>
    <button class="btn btn-primary btn-sm" onclick="runStream()">▶ 스트리밍 시작</button>
  </div>
  <div id="stream-output" class="log-box" style="min-height:80px;white-space:pre-wrap"></div>
  <div id="stream-meta" style="font-size:.78rem;color:var(--muted);margin-top:8px"></div>
</div>

</main>

<script>
const TOKEN = localStorage.getItem('auth_token');

async function api(method, path, body) {
  const r = await fetch(path, {
    method, headers: { 'Content-Type': 'application/json', ...(TOKEN ? { Authorization: `Bearer ${TOKEN}` } : {}) },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

async function getToken() {
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: 'admin@ai-orch.local', password: 'admin1234' })
    });
    if (r.ok) { const d = await r.json(); localStorage.setItem('auth_token', d.token); return d.token; }
  } catch(_) {}
  return null;
}

async function ensureToken() {
  if (!localStorage.getItem('auth_token')) await getToken();
}

// ── 요약 카드 ──
async function loadSummary() {
  try {
    const d = await api('GET', '/api/admin/health/dashboard?hours=24');
    const perf = d.perf || [];
    const totalCalls = perf.reduce((s,p) => s + (p.calls||0), 0);
    const totalSucc  = perf.reduce((s,p) => s + (p.successes||0), 0);
    const totalCost  = perf.reduce((s,p) => s + (p.total_cost||0), 0);
    const totalTok   = perf.reduce((s,p) => s + (p.total_tokens||0), 0);
    const confProvs  = (d.latest||[]).length;

    document.getElementById('s-total').textContent    = totalCalls;
    document.getElementById('s-success').textContent  = `성공 ${totalSucc}건 (${totalCalls ? Math.round(totalSucc/totalCalls*100) : 0}%)`;
    const statsResp = await api('GET', '/api/admin/inference/stats?days=1');
    const stats = statsResp.summary || statsResp;
    const realPct = stats.total ? Math.round(stats.realSuccess/stats.total*100) : 0;
    document.getElementById('s-real').textContent     = realPct + '%';
    document.getElementById('s-fallback').textContent = `Fallback ${stats.fallbackSuccess}건 / 에러 ${stats.errors}건`;
    document.getElementById('s-cost').textContent     = '$' + totalCost.toFixed(4);
    document.getElementById('s-tokens').textContent   = '토큰 ' + totalTok.toLocaleString();
    document.getElementById('s-providers').textContent = confProvs;
    document.getElementById('s-models').textContent   = '화이트리스트 활성 —';
  } catch(e) { console.error('summary err', e); }
}

// ── 캐시 통계 ──
async function loadCacheStats() {
  try {
    const d = await api('GET', '/api/ai/cache/stats');
    document.getElementById('cache-size').textContent  = d.cache.size + '건';
    document.getElementById('cache-valid').textContent = d.cache.valid + '건';
    document.getElementById('cache-max').textContent   = d.cache.maxSize + '건';
    document.getElementById('cache-ttl').textContent   = (d.cache.ttlMs/1000) + 's';
  } catch(e) { console.error('cache err', e); }
}

async function clearCache() {
  try {
    await api('POST', '/api/ai/cache/clear');
    await loadCacheStats();
    alert('캐시가 초기화되었습니다.');
  } catch(e) { alert('초기화 실패: ' + e.message); }
}

// ── 공급자 카드 ──
async function loadProviders() {
  try {
    const d = await api('GET', '/api/admin/health/dashboard?hours=24');
    const uptimeMap = {};
    (d.uptime||[]).forEach(u => uptimeMap[u.provider] = u);
    const perfMap = {};
    (d.perf||[]).forEach(p => perfMap[p.provider] = p);

    const grid = document.getElementById('provider-grid');
    grid.innerHTML = '';

    const providers = [...new Set([...(d.latest||[]).map(l=>l.provider), ...Object.keys(perfMap)])];
    if (!providers.length) { grid.innerHTML = '<div class="card" style="color:var(--muted)">데이터 없음 — 헬스체크를 실행하세요.</div>'; return; }

    providers.forEach(prov => {
      const latest  = (d.latest||[]).find(l => l.provider === prov) || {};
      const uptime  = uptimeMap[prov] || {};
      const perf    = perfMap[prov]   || {};
      const status  = latest.status || (perf.calls > 0 ? 'unknown' : 'unknown');
      const uptPct  = uptime.total_checks ? Math.round(uptime.ok_count / uptime.total_checks * 100) : null;
      const succPct = perf.calls ? Math.round(perf.successes / perf.calls * 100) : null;

      const card = document.createElement('div');
      card.className = `card provider-card status-${status || 'unknown'}`;
      const dotClass = status === 'ok' ? 'dot-ok' : status === 'down' ? 'dot-error' : status === 'degraded' ? 'dot-warn' : 'dot-null';
      card.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <span class="dot ${dotClass}"></span>
          <strong style="font-size:1rem;text-transform:capitalize">${prov}</strong>
          ${latest.latency_ms ? `<span style="color:var(--muted);font-size:.78rem;margin-left:auto">${latest.latency_ms}ms</span>` : ''}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.82rem">
          <div><span style="color:var(--muted)">24h 호출</span><br><strong>${perf.calls||0}</strong></div>
          <div><span style="color:var(--muted)">성공률</span><br><strong>${succPct !== null ? succPct+'%' : '—'}</strong></div>
          <div><span style="color:var(--muted)">Uptime</span><br><strong>${uptPct !== null ? uptPct+'%' : '—'}</strong></div>
          <div><span style="color:var(--muted)">비용</span><br><strong>$${(perf.total_cost||0).toFixed(4)}</strong></div>
        </div>
        ${perf.calls > 0 ? `<div style="margin-top:12px">
          <div class="bar-wrap"><div class="bar-fill ${succPct>=80?'bar-ok':succPct>=50?'bar-warn':'bar-err'}" style="width:${succPct||0}%"></div></div>
          <div style="font-size:.72rem;color:var(--muted);margin-top:4px">성공률 ${succPct||0}%</div>
        </div>` : ''}
        ${latest.error_code ? `<div style="margin-top:8px"><span class="err-chip">${latest.error_code}</span></div>` : ''}
      `;
      grid.appendChild(card);
    });
  } catch(e) { console.error('providers err', e); }
}

// ── 에러 분석 ──
async function loadErrors() {
  const days = document.getElementById('err-days').value;
  try {
    const d = await api('GET', `/api/admin/health/errors?days=${days}`);
    const rows = d.breakdown || [];
    const total = rows.reduce((s,r) => s + r.cnt, 0);
    const tbody = document.getElementById('err-tbody');
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="6" style="color:var(--muted);text-align:center">에러 없음</td></tr>'; return; }
    tbody.innerHTML = rows.map(r => {
      const pct = total ? Math.round(r.cnt/total*100) : 0;
      const catColor = r.error_category === 'auth' ? 'var(--error)' : r.error_category === 'network' ? 'var(--warn)' : 'var(--muted)';
      return `<tr>
        <td><code style="color:var(--warn)">${r.error_code||'—'}</code></td>
        <td><span style="color:${catColor}">${r.error_category||'unknown'}</span></td>
        <td>${r.provider||'—'}</td>
        <td><strong>${r.cnt}</strong></td>
        <td style="color:var(--muted);font-size:.78rem">${r.last_seen ? r.last_seen.slice(0,19) : '—'}</td>
        <td style="min-width:100px">
          <div class="bar-wrap"><div class="bar-fill bar-err" style="width:${pct}%"></div></div>
          <span style="font-size:.72rem;color:var(--muted)">${pct}%</span>
        </td>
      </tr>`;
    }).join('');
  } catch(e) { document.getElementById('err-tbody').innerHTML = `<tr><td colspan="6" style="color:var(--error)">${e.message}</td></tr>`; }
}

// ── 추론 통계 ──
async function loadStats() {
  const days = document.getElementById('stat-days').value;
  try {
    const statsData = await api('GET', `/api/admin/inference/stats?days=${days}`);
    const rows = statsData.byProvider || statsData;
    const tbody = document.getElementById('stat-tbody');
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="7" style="color:var(--muted);text-align:center">데이터 없음</td></tr>'; return; }
    tbody.innerHTML = rows.map(r => `<tr>
      <td><strong>${r.provider}</strong></td>
      <td>${r.total}</td>
      <td><span class="cost-chip">${r.real_success}</span></td>
      <td>${r.fallback_success}</td>
      <td>${r.errors > 0 ? `<span class="err-chip">${r.errors}</span>` : r.errors}</td>
      <td>${r.avg_ms ? r.avg_ms + 'ms' : '—'}</td>
      <td>$${(r.total_cost||0).toFixed(6)}</td>
    </tr>`).join('');
  } catch(e) { document.getElementById('stat-tbody').innerHTML = `<tr><td colspan="7" style="color:var(--error)">${e.message}</td></tr>`; }
}

// ── 최근 로그 ──
async function loadRecentLogs() {
  const limit = document.getElementById('log-limit').value;
  const box = document.getElementById('recent-logs');
  try {
    const d = await api('GET', `/api/admin/inference/recent?limit=${limit}`);
    const rows = d.rows || [];
    if (!rows.length) { box.textContent = '로그 없음'; return; }
    box.innerHTML = rows.map(r => {
      const ts = r.created_at ? r.created_at.slice(0,19) : '—';
      const cls = r.success ? (r.is_fallback ? 'warn' : 'ok') : 'err';
      const fallTag = r.is_fallback ? ` [FALLBACK→${r.used_model}]` : '';
      const cost = r.cost_usd ? ` $${parseFloat(r.cost_usd).toFixed(6)}` : '';
      const lat = r.latency_ms ? ` ${r.latency_ms}ms` : '';
      return `<div class="${cls}">[${ts}] ${r.provider}/${r.used_model}${fallTag}${lat}${cost} ${r.success ? '✓' : `✗ ${r.error_code||''}`}</div>`;
    }).join('');
  } catch(e) { box.textContent = '로그 조회 실패: ' + e.message; }
}

// ── 헬스체크 실행 ──
async function runHealthCheck() {
  const btn = event.target;
  btn.disabled = true; btn.textContent = '⏳ 체크 중...';
  try {
    const d = await api('POST', '/api/admin/health/check', {});
    await loadProviders();
    alert(`헬스체크 완료: ${d.checked}개 공급자 확인\n${Object.entries(d.results||{}).map(([k,v]) => `${k}: ${v.status} ${v.latencyMs||''}ms`).join('\n')}`);
  } catch(e) { alert('헬스체크 실패: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '⚡ 헬스체크'; }
}

// ── 스트리밍 테스트 ──
function runStream() {
  const prompt  = document.getElementById('stream-prompt').value.trim() || '안녕하세요!';
  const model   = document.getElementById('stream-model').value;
  const out     = document.getElementById('stream-output');
  const meta    = document.getElementById('stream-meta');
  out.textContent = '';
  meta.textContent = '';

  const token = localStorage.getItem('auth_token') || '';
  const body = JSON.stringify({ messages: [{ role: 'user', content: prompt }], model: model || undefined, strategy: 'fast', maxTokens: 200, pipeline: 'dashboard-stream' });
  const start = Date.now();

  fetch('/api/ai/chat/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) },
    body,
  }).then(async res => {
    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const lines = part.split('\n');
        const eventLine = lines.find(l => l.startsWith('event:'));
        const dataLine  = lines.find(l => l.startsWith('data:'));
        if (!dataLine) continue;
        const evt  = eventLine ? eventLine.slice(6).trim() : 'message';
        let data;
        try { data = JSON.parse(dataLine.slice(5)); } catch { continue; }
        if (evt === 'chunk') out.textContent += data.text;
        if (evt === 'done')  meta.textContent = `✓ 완료 | 모델: ${data.model} | ${data.ms}ms | 공급자: ${data.provider}`;
        if (evt === 'error') { meta.textContent = '✗ 오류: ' + data.error; out.style.color = 'var(--error)'; }
      }
    }
    if (!meta.textContent) meta.textContent = `완료 (${Date.now()-start}ms)`;
  }).catch(e => { meta.textContent = '스트리밍 오류: ' + e.message; });
}

// ── 전체 갱신 ──
async function refreshAll() {
  document.getElementById('last-refresh').textContent = '갱신 중...';
  await Promise.all([loadSummary(), loadCacheStats(), loadProviders(), loadErrors(), loadStats(), loadRecentLogs()]);
  document.getElementById('last-refresh').textContent = '최종 갱신: ' + new Date().toLocaleTimeString('ko-KR');
}

// 초기화
(async () => {
  await ensureToken();
  await refreshAll();
  // 30초마다 자동 갱신
  setInterval(refreshAll, 30000);
})();
</script>

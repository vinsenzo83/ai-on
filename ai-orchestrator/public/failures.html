<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Failure Replay — AI Orchestrator Debug</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

    .header {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      padding: 16px 24px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .header h1 { font-size: 18px; font-weight: 700; color: #c7d2fe; }
    .header .badge { background: rgba(239,68,68,.2); color: #fca5a5; border: 1px solid rgba(239,68,68,.3);
                     border-radius: 6px; padding: 2px 10px; font-size: 12px; font-weight: 600; }

    .stats-bar {
      display: flex; gap: 12px; padding: 16px 24px; flex-wrap: wrap;
      background: rgba(255,255,255,.02); border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .stat-card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
                 border-radius: 10px; padding: 12px 18px; min-width: 130px; }
    .stat-card .label { font-size: 11px; color: rgba(255,255,255,.4); margin-bottom: 4px; }
    .stat-card .value { font-size: 22px; font-weight: 700; }
    .stat-card.red   .value { color: #f87171; }
    .stat-card.orange .value { color: #fb923c; }
    .stat-card.blue  .value { color: #60a5fa; }
    .stat-card.green .value { color: #4ade80; }

    .main { display: flex; height: calc(100vh - 130px); }

    /* ── 왼쪽 목록 ── */
    .list-panel {
      width: 360px; flex-shrink: 0;
      border-right: 1px solid rgba(255,255,255,.06);
      overflow-y: auto;
    }
    .list-toolbar {
      padding: 10px 14px; display: flex; gap: 8px; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .list-toolbar select, .list-toolbar input {
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      color: #e2e8f0; border-radius: 6px; padding: 5px 10px; font-size: 12px;
    }
    .refresh-btn {
      margin-left: auto; background: rgba(99,102,241,.2); border: 1px solid rgba(99,102,241,.4);
      color: #a5b4fc; border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer;
    }
    .refresh-btn:hover { background: rgba(99,102,241,.35); }

    .failure-item {
      padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,.04);
      cursor: pointer; transition: background .15s;
    }
    .failure-item:hover { background: rgba(255,255,255,.04); }
    .failure-item.active { background: rgba(99,102,241,.12); border-left: 3px solid #6366f1; }
    .failure-item .fi-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .failure-item .fi-id { font-size: 11px; color: rgba(255,255,255,.35); }
    .failure-item .fi-time { font-size: 11px; color: rgba(255,255,255,.3); }
    .failure-item .fi-msg { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
    .failure-item .fi-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 10px; border-radius: 4px; padding: 2px 7px; font-weight: 600; white-space: nowrap; }
    .tag.budget_exceeded { background: rgba(239,68,68,.15); color: #f87171; }
    .tag.timeout         { background: rgba(251,146,60,.15); color: #fb923c; }
    .tag.llm_error       { background: rgba(139,92,246,.15); color: #c084fc; }
    .tag.chain_error     { background: rgba(99,102,241,.15); color: #a5b4fc; }
    .tag.partial         { background: rgba(234,179,8,.15); color: #fbbf24; }
    .tag.replayed        { background: rgba(34,197,94,.15); color: #4ade80; }
    .tag.complexity      { background: rgba(255,255,255,.08); color: rgba(255,255,255,.5); }

    /* ── 오른쪽 상세 ── */
    .detail-panel {
      flex: 1; overflow-y: auto; padding: 20px 24px;
    }
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: rgba(255,255,255,.2); gap: 12px;
    }
    .empty-state .icon { font-size: 48px; }

    .detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .detail-title { font-size: 16px; font-weight: 700; }
    .replay-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; color: #fff; border-radius: 8px;
      padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .replay-btn:hover { opacity: .85; }
    .replay-btn:disabled { opacity: .4; cursor: not-allowed; }

    .section { margin-bottom: 20px; }
    .section-title {
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,.4);
      text-transform: uppercase; letter-spacing: .05em;
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .info-card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06);
                 border-radius: 8px; padding: 10px 14px; }
    .info-card .label { font-size: 11px; color: rgba(255,255,255,.35); margin-bottom: 3px; }
    .info-card .value { font-size: 13px; font-weight: 600; word-break: break-all; }

    .code-block {
      background: rgba(0,0,0,.4); border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px; padding: 14px; font-family: 'Courier New', monospace;
      font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
      max-height: 300px; overflow-y: auto; color: #a5f3fc;
    }
    .error-block {
      background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2);
      border-radius: 8px; padding: 12px; font-size: 13px; color: #fca5a5;
    }

    .task-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .task-table th { text-align: left; padding: 6px 10px; background: rgba(255,255,255,.04);
                     color: rgba(255,255,255,.4); font-weight: 600; }
    .task-table td { padding: 6px 10px; border-top: 1px solid rgba(255,255,255,.04); }
    .task-table tr:hover td { background: rgba(255,255,255,.02); }

    .replay-result {
      background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2);
      border-radius: 8px; padding: 14px; margin-top: 16px; font-size: 13px;
    }
    .replay-result.error { background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.2); }
    .replay-result .rr-title { font-weight: 700; margin-bottom: 8px; color: #4ade80; }
    .replay-result.error .rr-title { color: #f87171; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }
  </style>
</head>
<body>

<div class="header">
  <span style="font-size:22px">🔴</span>
  <h1>Failure Replay Debug</h1>
  <span class="badge">Phase 3</span>
  <a href="/" style="margin-left:auto; color:#a5b4fc; font-size:13px; text-decoration:none;">← 메인으로</a>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat-card red">
    <div class="label">총 실패</div>
    <div class="value" id="stat-total">—</div>
  </div>
  <div class="stat-card orange">
    <div class="label">Budget 초과</div>
    <div class="value" id="stat-budget">—</div>
  </div>
  <div class="stat-card orange">
    <div class="label">Timeout</div>
    <div class="value" id="stat-timeout">—</div>
  </div>
  <div class="stat-card blue">
    <div class="label">총 재실행</div>
    <div class="value" id="stat-replays">—</div>
  </div>
  <div class="stat-card green">
    <div class="label">Replay 성공률</div>
    <div class="value" id="stat-replay-rate">—</div>
  </div>
</div>

<div class="main">
  <!-- 왼쪽: 실패 목록 -->
  <div class="list-panel">
    <div class="list-toolbar">
      <select id="filter-type" onchange="loadList()">
        <option value="">전체</option>
        <option value="budget_exceeded">Budget 초과</option>
        <option value="timeout">Timeout</option>
        <option value="llm_error">LLM 오류</option>
        <option value="chain_error">Chain 오류</option>
      </select>
      <button class="refresh-btn" onclick="init()">🔄 새로고침</button>
    </div>
    <div id="list-container">
      <div style="padding:20px; text-align:center; color:rgba(255,255,255,.3); font-size:13px;">불러오는 중...</div>
    </div>
  </div>

  <!-- 오른쪽: 상세 보기 -->
  <div class="detail-panel" id="detail-panel">
    <div class="empty-state">
      <div class="icon">🔍</div>
      <div>왼쪽에서 실패 항목을 선택하세요</div>
    </div>
  </div>
</div>

<script>
let allItems = [];
let selectedId = null;

async function init() {
  await Promise.all([loadStats(), loadList()]);
}

async function loadStats() {
  try {
    const r = await fetch('/api/agent/failures/stats');
    const d = await r.json();
    if (!d.success) return;
    const s = d.stats;
    document.getElementById('stat-total').textContent   = s.total_failures   ?? '0';
    document.getElementById('stat-budget').textContent  = s.budget_exceeded  ?? '0';
    document.getElementById('stat-timeout').textContent = s.timeout          ?? '0';
    document.getElementById('stat-replays').textContent = s.total_replays    ?? '0';

    const replays    = s.total_replays || 0;
    const replayRuns = s.replay_runs   || 0;
    const rate = replayRuns > 0 ? ((replays / replayRuns) * 100).toFixed(0) + '%' : '—';
    document.getElementById('stat-replay-rate').textContent = rate;
  } catch (e) {
    console.error('Stats load error:', e);
  }
}

async function loadList() {
  const container = document.getElementById('list-container');
  const typeFilter = document.getElementById('filter-type').value;

  try {
    const r = await fetch('/api/agent/failures?limit=50');
    const d = await r.json();
    if (!d.success) { container.innerHTML = '<div style="padding:20px;color:#f87171">불러오기 실패</div>'; return; }

    allItems = d.items || [];
    const filtered = typeFilter ? allItems.filter(i => i.errorType === typeFilter) : allItems;

    if (filtered.length === 0) {
      container.innerHTML = '<div style="padding:24px; text-align:center; color:rgba(255,255,255,.3); font-size:13px;">실패 기록이 없습니다 ✅</div>';
      return;
    }

    container.innerHTML = filtered.map(item => {
      const t     = new Date(item.createdAt);
      const tStr  = isNaN(t) ? '?' : t.toLocaleString('ko');
      const tags  = [];
      if (item.errorType)   tags.push(`<span class="tag ${item.errorType}">${item.errorType}</span>`);
      if (item.hasPartial)  tags.push(`<span class="tag partial">⚡ partial</span>`);
      if (item.replayCount) tags.push(`<span class="tag replayed">↩ ${item.replayCount}회 재실행</span>`);
      if (item.complexity)  tags.push(`<span class="tag complexity">${item.complexity}</span>`);
      return `
        <div class="failure-item${item.id === selectedId ? ' active' : ''}" onclick="selectItem(${item.id})" data-id="${item.id}">
          <div class="fi-header">
            <span class="fi-id">#${item.id}</span>
            <span class="fi-time">${tStr}</span>
          </div>
          <div class="fi-msg" title="${escapeHtml(item.userMessage)}">${escapeHtml(item.userMessage.substring(0, 60))}${item.userMessage.length > 60 ? '…' : ''}</div>
          <div class="fi-tags">${tags.join('')}</div>
        </div>`;
    }).join('');
  } catch (e) {
    container.innerHTML = `<div style="padding:20px;color:#f87171">오류: ${e.message}</div>`;
  }
}

async function selectItem(id) {
  selectedId = id;
  // 활성 항목 표시
  document.querySelectorAll('.failure-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === id);
  });

  const detail = document.getElementById('detail-panel');
  detail.innerHTML = '<div style="padding:40px; text-align:center; color:rgba(255,255,255,.3);">불러오는 중…</div>';

  try {
    const r = await fetch(`/api/agent/failure/${id}`);
    const d = await r.json();
    if (!d.success || !d.failure) {
      detail.innerHTML = '<div style="padding:40px; color:#f87171">상세 불러오기 실패</div>';
      return;
    }
    renderDetail(d.failure);
  } catch (e) {
    detail.innerHTML = `<div style="padding:40px; color:#f87171">오류: ${e.message}</div>`;
  }
}

function renderDetail(f) {
  const t = new Date(f.createdAt);
  const tStr = isNaN(t) ? '?' : t.toLocaleString('ko');

  const tasks = f.tasks || f.plan?.tasks || [];
  const budget = f.budget || {};

  const taskRows = tasks.map(t =>
    `<tr><td>${escapeHtml(t.id||'')}</td><td>${escapeHtml(t.name||'')}</td><td>${escapeHtml(t.type||'')}</td><td>${escapeHtml(t.status||'-')}</td></tr>`
  ).join('');

  const toolCalls = f.toolCalls;
  const toolSection = toolCalls ? `
    <div class="section">
      <div class="section-title">🔧 Tool Calls</div>
      <div class="code-block">${escapeHtml(JSON.stringify(toolCalls, null, 2))}</div>
    </div>` : '';

  const budgetSection = Object.keys(budget).length ? `
    <div class="section">
      <div class="section-title">📊 Budget 사용량</div>
      <div class="info-grid">
        ${Object.entries(budget).map(([k,v]) => `
          <div class="info-card"><div class="label">${k}</div><div class="value">${escapeHtml(String(v))}</div></div>
        `).join('')}
      </div>
    </div>` : '';

  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-title">#${f.id} — ${escapeHtml(f.userMessage.substring(0, 60))}${f.userMessage.length > 60 ? '…' : ''}</div>
        <div style="font-size:12px; color:rgba(255,255,255,.35); margin-top:4px;">${tStr}</div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="replay-btn" onclick="replayFull(${f.id})" id="btn-replay-full">🔄 재실행 (새 플랜)</button>
        ${f.plan ? `<button class="replay-btn" style="background:linear-gradient(135deg,#0891b2,#0e7490)" onclick="replayExecute(${f.id})" id="btn-replay-exec">⚡ 원본 플랜 재실행</button>` : ''}
      </div>
    </div>

    <div id="replay-result-area"></div>

    <div class="section">
      <div class="section-title">📋 기본 정보</div>
      <div class="info-grid">
        <div class="info-card"><div class="label">Plan ID</div><div class="value">${escapeHtml(f.planId||'-')}</div></div>
        <div class="info-card"><div class="label">Session</div><div class="value">${escapeHtml(f.sessionId||'-')}</div></div>
        <div class="info-card"><div class="label">Strategy</div><div class="value">${escapeHtml(f.strategy||'-')}</div></div>
        <div class="info-card"><div class="label">Model</div><div class="value">${escapeHtml(f.model||'-')}</div></div>
        <div class="info-card"><div class="label">Complexity</div><div class="value">${escapeHtml(f.complexity||'-')}</div></div>
        <div class="info-card"><div class="label">Error Type</div><div class="value" style="color:#f87171">${escapeHtml(f.errorType||'-')}</div></div>
        <div class="info-card"><div class="label">Corrections</div><div class="value">${f.correctionRounds||0}회</div></div>
        <div class="info-card"><div class="label">Replays</div><div class="value">${f.replayCount||0}회</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">💬 사용자 메시지</div>
      <div class="code-block" style="color:#e2e8f0">${escapeHtml(f.userMessage)}</div>
    </div>

    ${f.finalError ? `
    <div class="section">
      <div class="section-title">❌ 오류 메시지</div>
      <div class="error-block">${escapeHtml(f.finalError)}</div>
    </div>` : ''}

    ${tasks.length ? `
    <div class="section">
      <div class="section-title">📌 Task 목록 (${tasks.length}개)</div>
      <table class="task-table">
        <thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Status</th></tr></thead>
        <tbody>${taskRows}</tbody>
      </table>
    </div>` : ''}

    ${budgetSection}
    ${toolSection}

    ${f.partialResult ? `
    <div class="section">
      <div class="section-title">⚡ Partial Result</div>
      <div class="code-block" style="color:#fef08a">${escapeHtml(f.partialResult.substring(0, 1000))}${f.partialResult.length > 1000 ? '\n…(생략)' : ''}</div>
    </div>` : ''}
  `;
}

async function replayFull(id) {
  await _doReplay(id, false);
}
async function replayExecute(id) {
  await _doReplay(id, true);
}

async function _doReplay(id, overridePlan) {
  const btn1 = document.getElementById('btn-replay-full');
  const btn2 = document.getElementById('btn-replay-exec');
  const area  = document.getElementById('replay-result-area');
  if (btn1) btn1.disabled = true;
  if (btn2) btn2.disabled = true;
  if (area) area.innerHTML = '<div style="padding:12px; color:rgba(255,255,255,.4); font-size:13px;">🔄 재실행 중… (최대 90초)</div>';

  try {
    const r = await fetch(`/api/agent/replay/${id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ overridePlan }),
    });
    const d = await r.json();

    if (d.success) {
      area.innerHTML = `
        <div class="replay-result">
          <div class="rr-title">✅ 재실행 성공 (${d.totalMs}ms)</div>
          <div style="margin-bottom:8px; font-size:12px; color:rgba(255,255,255,.5)">
            Steps: ${d.chainLog?.length||0} | Corrections: ${d.corrections||0}
          </div>
          <div style="font-size:13px; line-height:1.6; max-height:200px; overflow-y:auto; color:#d1fae5;">${escapeHtml((d.content||'').substring(0,800))}${(d.content||'').length>800?'…':''}</div>
        </div>`;
    } else {
      area.innerHTML = `
        <div class="replay-result error">
          <div class="rr-title">❌ 재실행 실패</div>
          <div>${escapeHtml(d.error||'알 수 없는 오류')}</div>
        </div>`;
    }
    // 통계 갱신
    await loadStats();
    await loadList();
  } catch (e) {
    if (area) area.innerHTML = `<div class="replay-result error"><div class="rr-title">❌ 오류</div><div>${escapeHtml(e.message)}</div></div>`;
  } finally {
    if (btn1) btn1.disabled = false;
    if (btn2) btn2.disabled = false;
  }
}

function escapeHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
setInterval(loadStats, 30000); // 30초마다 통계 갱신
</script>
</body>
</html>
